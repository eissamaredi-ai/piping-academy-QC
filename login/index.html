<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ورود — Piping Studio</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: Tahoma, 'Segoe UI', sans-serif; background:#F1F5F9; color:#0F172A; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
  a { text-decoration:none; }

  .top-bar { position:fixed; top:16px; left:16px; right:16px; display:flex; justify-content:space-between; align-items:center; }
  .back-link { color:#64748b; font-size:13px; }

  .card { background:white; border-radius:24px; box-shadow:0 10px 40px rgba(0,0,0,0.08); max-width:380px; width:100%; padding:36px 28px; animation:fadeIn 0.4s ease; }
  @keyframes fadeIn { from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }

  .logo-row { display:flex; align-items:center; justify-content:center; gap:8px; margin-bottom:22px; }
  .logo-icon { width:38px; height:38px; border-radius:10px; background:linear-gradient(135deg,#2563EB,#dc2626); display:flex; align-items:center; justify-content:center; color:white; font-weight:bold; }
  .logo-text { font-weight:bold; font-size:14px; }

  h1 { text-align:center; font-size:22px; font-weight:bold; margin-bottom:6px; }
  .subtitle { text-align:center; font-size:12.5px; color:#94a3b8; margin-bottom:26px; }

  .tabs { display:flex; gap:4px; background:#f1f5f9; border-radius:12px; padding:4px; margin-bottom:24px; }
  .tab { flex:1; text-align:center; padding:9px; border-radius:9px; font-size:13px; font-weight:bold; cursor:pointer; color:#94a3b8; border:none; background:transparent; }
  .tab.active { background:white; color:#2563EB; box-shadow:0 1px 4px rgba(0,0,0,0.08); }

  .field { margin-bottom:16px; }
  .field label { display:block; font-size:12.5px; font-weight:bold; margin-bottom:6px; color:#475569; }
  .field input { width:100%; border:1.5px solid #e2e8f0; border-radius:11px; padding:12px 14px; font-size:13.5px; outline:none; }
  .field input:focus { border-color:#2563EB; box-shadow:0 0 0 3px rgba(37,99,235,0.1); }
  .field-error { font-size:11px; color:#dc2626; margin-top:5px; display:none; }
  .field-error.show { display:block; }

  .pw-wrap { position:relative; }
  .pw-toggle { position:absolute; left:12px; top:50%; transform:translateY(-50%); cursor:pointer; font-size:13px; color:#94a3b8; background:none; border:none; }

  .terms-row { display:flex; align-items:flex-start; gap:8px; font-size:12px; color:#64748b; margin-bottom:16px; line-height:1.6; }

  .btn-primary { width:100%; background:linear-gradient(135deg,#2563EB,#1e40af); color:white; border:none; border-radius:12px; padding:13px; font-size:14px; font-weight:bold; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; }
  .btn-primary:disabled { opacity:0.6; cursor:not-allowed; }

  .spinner { width:16px; height:16px; border:2px solid rgba(255,255,255,0.4); border-top-color:white; border-radius:50%; animation:spin 0.6s linear infinite; display:none; }
  @keyframes spin { to{transform:rotate(360deg);} }

  .bottom-link { text-align:center; font-size:12.5px; color:#64748b; margin-top:18px; }
  .bottom-link a { color:#2563EB; font-weight:bold; }

  .alert-box { border-radius:10px; padding:12px 14px; font-size:12.5px; margin-bottom:16px; display:none; }
  .alert-box.show { display:block; }
  .alert-error { background:#fef2f2; color:#991b1b; }
  .alert-success { background:#f0fdf4; color:#166534; }

  .form-page { display:none; }
  .form-page.active { display:block; }
</style>
</head>
<body>

<div class="top-bar">
  <a href="../" class="back-link">← بازگشت به سایت</a>
</div>

<div class="card">
  <div class="logo-row">
    <div class="logo-icon">⬡</div>
    <span class="logo-text">Piping Studio</span>
  </div>

  <div class="tabs">
    <button class="tab active" id="tabLogin" onclick="showPage('login')">ورود</button>
    <button class="tab" id="tabRegister" onclick="showPage('register')">ثبت‌نام</button>
  </div>

  <div class="alert-box" id="alertBox"></div>

  <!-- LOGIN PAGE -->
  <div class="form-page active" id="pageLogin">
    <h1>ورود</h1>
    <div class="subtitle">با ایمیل خودت وارد شو</div>

    <div class="field">
      <label>ایمیل</label>
      <input type="email" placeholder="example@email.com" id="loginEmail" autofocus>
    </div>

    <div class="field">
      <label>رمز عبور</label>
      <div class="pw-wrap">
        <input type="password" placeholder="••••••••" id="loginPass">
        <button class="pw-toggle" onclick="togglePw('loginPass', this)">👁️</button>
      </div>
    </div>

    <button class="btn-primary" id="btnLogin" onclick="doLogin()">
      <span class="spinner" id="spinnerLogin"></span>
      <span id="btnTextLogin">ورود</span>
    </button>

    <div class="bottom-link">آیا هنوز عضو نیستید؟ <a href="#" onclick="showPage('register')">اکنون عضو شوید</a></div>
  </div>

  <!-- REGISTER PAGE -->
  <div class="form-page" id="pageRegister">
    <h1>ثبت‌نام</h1>
    <div class="subtitle">رایگان عضو Piping Studio شو</div>

    <div class="field">
      <label>نام و نام خانوادگی</label>
      <input type="text" placeholder="نام کامل" id="regName">
    </div>

    <div class="field">
      <label>ایمیل</label>
      <input type="email" placeholder="example@email.com" id="regEmail">
    </div>

    <div class="field">
      <label>رمز عبور (حداقل ۶ کاراکتر)</label>
      <div class="pw-wrap">
        <input type="password" placeholder="••••••••" id="regPass">
        <button class="pw-toggle" onclick="togglePw('regPass', this)">👁️</button>
      </div>
    </div>

    <div class="terms-row">
      <input type="checkbox" id="termsCheck" style="margin-top:2px;">
      <label for="termsCheck">قوانین و شرایط استفاده را می‌پذیرم.</label>
    </div>

    <button class="btn-primary" id="btnReg" onclick="doRegister()">
      <span class="spinner" id="spinnerReg"></span>
      <span id="btnTextReg">ثبت نام</span>
    </button>

    <div class="bottom-link">قبلاً عضو شده‌اید؟ <a href="#" onclick="showPage('login')">وارد شوید</a></div>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import {
    getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, updateProfile
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import {
    getFirestore, doc, setDoc
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCtBH1hokpEapFxCZn93Vj_TAPbO9ZsP7s",
    authDomain: "piping-academy-qc.firebaseapp.com",
    projectId: "piping-academy-qc",
    storageBucket: "piping-academy-qc.firebasestorage.app",
    messagingSenderId: "169266591577",
    appId: "1:169266591577:web:55cc9e5131c0c3fbc13e48"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  window.firebaseAuth = auth;
  window.firebaseDb = db;
  window.fb_createUser = createUserWithEmailAndPassword;
  window.fb_signIn = signInWithEmailAndPassword;
  window.fb_updateProfile = updateProfile;
  window.fb_doc = doc;
  window.fb_setDoc = setDoc;
  window.firebaseReady = true;
</script>

<script>
function showPage(page) {
  document.getElementById('pageLogin').classList.toggle('active', page === 'login');
  document.getElementById('pageRegister').classList.toggle('active', page === 'register');
  document.getElementById('tabLogin').classList.toggle('active', page === 'login');
  document.getElementById('tabRegister').classList.toggle('active', page === 'register');
  hideAlert();
}

function togglePw(id, btn) {
  const inp = document.getElementById(id);
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? '👁️' : '🙈';
}

function showAlert(msg, type) {
  const box = document.getElementById('alertBox');
  box.textContent = msg;
  box.className = 'alert-box show ' + (type === 'error' ? 'alert-error' : 'alert-success');
}
function hideAlert() {
  document.getElementById('alertBox').className = 'alert-box';
}

function setLoading(btnId, spinnerId, textId, loading, loadingText, normalText) {
  document.getElementById(btnId).disabled = loading;
  document.getElementById(spinnerId).style.display = loading ? 'inline-block' : 'none';
  document.getElementById(textId).textContent = loading ? loadingText : normalText;
}

function translateError(code) {
  const map = {
    'auth/email-already-in-use': 'این ایمیل قبلاً ثبت‌نام شده است',
    'auth/invalid-email': 'ایمیل معتبر نیست',
    'auth/weak-password': 'رمز عبور باید حداقل ۶ کاراکتر باشد',
    'auth/user-not-found': 'حسابی با این ایمیل یافت نشد',
    'auth/wrong-password': 'رمز عبور اشتباه است',
    'auth/invalid-credential': 'ایمیل یا رمز عبور اشتباه است',
    'auth/too-many-requests': 'تعداد تلاش‌ها زیاد بود، کمی صبر کنید'
  };
  return map[code] || 'خطایی رخ داد، دوباره تلاش کنید';
}

async function doRegister() {
  hideAlert();
  const name = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const pass = document.getElementById('regPass').value;
  const terms = document.getElementById('termsCheck').checked;

  if (!name) { showAlert('لطفاً نام خود را وارد کنید', 'error'); return; }
  if (!email) { showAlert('لطفاً ایمیل را وارد کنید', 'error'); return; }
  if (pass.length < 6) { showAlert('رمز عبور باید حداقل ۶ کاراکتر باشد', 'error'); return; }
  if (!terms) { showAlert('باید قوانین و شرایط را بپذیرید', 'error'); return; }

  setLoading('btnReg', 'spinnerReg', 'btnTextReg', true, 'در حال ثبت‌نام...', 'ثبت نام');
  try {
    const cred = await window.fb_createUser(window.firebaseAuth, email, pass);
    await window.fb_updateProfile(cred.user, { displayName: name });
    await window.fb_setDoc(window.fb_doc(window.firebaseDb, 'users', cred.user.uid), {
      name: name, email: email, createdAt: new Date().toISOString()
    });
    showAlert('✓ ثبت‌نام با موفقیت انجام شد', 'success');
    setTimeout(() => { window.location.href = '../'; }, 1500);
  } catch (e) {
    showAlert(translateError(e.code), 'error');
  }
  setLoading('btnReg', 'spinnerReg', 'btnTextReg', false, '', 'ثبت نام');
}

async function doLogin() {
  hideAlert();
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPass').value;

  if (!email || !pass) { showAlert('لطفاً ایمیل و رمز عبور را وارد کنید', 'error'); return; }

  setLoading('btnLogin', 'spinnerLogin', 'btnTextLogin', true, 'در حال ورود...', 'ورود');
  try {
    await window.fb_signIn(window.firebaseAuth, email, pass);
    showAlert('✓ ورود موفقیت‌آمیز بود', 'success');
    setTimeout(() => { window.location.href = '../'; }, 1200);
  } catch (e) {
    showAlert(translateError(e.code), 'error');
  }
  setLoading('btnLogin', 'spinnerLogin', 'btnTextLogin', false, '', 'ورود');
}
</script>

</body>
</html>
