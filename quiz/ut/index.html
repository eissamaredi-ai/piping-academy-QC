<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>آزمون UT — آکادمی پایپینگ و جوشکاری</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: Tahoma, 'Segoe UI', sans-serif; background:#F8FAFC; color:#0F172A; }
  a { text-decoration:none; color:inherit; }
  .navbar { position:sticky; top:0; z-index:50; background:rgba(15,23,42,0.97); border-bottom:1px solid #1e293b; }
  .navbar-inner { max-width:600px; margin:0 auto; padding:14px 20px; display:flex; align-items:center; justify-content:space-between; }
  .logo { display:flex; align-items:center; gap:8px; color:white; font-weight:bold; font-size:13px; }
  .logo-icon { width:28px; height:28px; border-radius:8px; background:linear-gradient(135deg,#2563EB,#06B6D4); display:flex; align-items:center; justify-content:center; color:white; font-size:13px; }
  .back-link { color:#94a3b8; font-size:12px; }
  .wrap { max-width:560px; margin:0 auto; padding:30px 20px 60px; }
  .quiz-meta { display:flex; justify-content:space-between; font-size:12px; color:#64748b; margin-bottom:10px; }
  .dots { display:flex; justify-content:center; gap:6px; margin-bottom:20px; }
  .dot { width:10px; height:10px; border-radius:50%; background:#e2e8f0; }
  .dot.current { background:#2563EB; transform:scale(1.3); }
  .dot.correct { background:#16a34a; }
  .dot.wrong { background:#dc2626; }
  .qcard { background:white; border:1px solid #e2e8f0; border-radius:16px; padding:24px; box-shadow:0 1px 6px rgba(0,0,0,0.05); }
  .qtext { font-size:15px; font-weight:bold; line-height:1.7; margin-bottom:20px; }
  .opt { display:block; width:100%; text-align:right; border:2px solid #e2e8f0; border-radius:12px; padding:13px 14px; font-size:13px; margin-bottom:10px; background:white; cursor:pointer; color:#334155; }
  .opt.correct { border-color:#16a34a; background:#f0fdf4; }
  .opt.wrong { border-color:#dc2626; background:#fef2f2; }
  .explain { background:#eff6ff; border-right:4px solid #2563EB; border-radius:8px; padding:12px; font-size:12px; line-height:1.7; margin-top:14px; color:#334155; display:none; }
  .explain.show { display:block; }
  .nav-row { display:flex; justify-content:space-between; margin-top:20px; }
  .btn { font-size:13px; font-weight:bold; padding:10px 22px; border-radius:10px; border:none; cursor:pointer; }
  .btn-prev { background:transparent; color:#64748b; }
  .btn-next { background:#2563EB; color:white; }
  .btn-next:disabled { opacity:0.4; cursor:not-allowed; }
  .result { text-align:center; }
  .result-icon { font-size:50px; margin-bottom:10px; }
  .score { font-size:42px; font-weight:bold; margin:10px 0; }
  .restart { background:#2563EB; color:white; font-size:13px; font-weight:bold; padding:12px 24px; border-radius:10px; border:none; cursor:pointer; margin-top:16px; }
</style>
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <div class="logo"><div class="logo-icon">⬡</div> آکادمی پایپینگ و جوشکاری</div>
    <a href="../" class="back-link">← بازگشت به آزمون‌ها</a>
  </div>
</nav>

<div class="wrap">
  <div class="quiz-meta">
    <span>آزمون UT — تست فراصوتی</span>
    <span id="counter">سوال ۱ از ۵</span>
  </div>
  <div class="dots" id="dots"></div>
  <div class="qcard" id="quizCard"></div>
  <div class="nav-row" id="navRow" style="display:none;">
    <button class="btn btn-prev" id="prevBtn">→ قبلی</button>
    <button class="btn btn-next" id="nextBtn" disabled>بعدی</button>
  </div>
</div>

<script>
const questions = [
  { q: "اصل کار UT (Ultrasonic Testing) بر چه پایه‌ای است؟", options: ["تابش اشعه گاما", "ارسال امواج فراصوت و تحلیل بازتاب آن‌ها", "پاشش مایع رنگی", "ایجاد میدان مغناطیسی"], correct: 1, explain: "UT با ارسال امواج فراصوت به داخل متریال و تحلیل بازتاب آن‌ها از سطوح و عیوب داخلی، محل و اندازه‌ی عیب را تخمین می‌زند." },
  { q: "UT برای کشف کدام نوع عیب مناسب‌تر است؟", options: ["عیوب سطحی مثل Spatter", "عیوب داخلی عمیق مثل Lack of Fusion", "رنگ نامناسب سطح", "خوردگی اتمسفری سطحی"], correct: 1, explain: "UT به‌خصوص برای کشف عیوب داخلی عمیق مثل Lack of Fusion یا ترک‌های داخلی که RT گاهی به‌سختی نشان می‌دهد، بسیار مؤثر است." },
  { q: "برای انتقال مؤثر امواج فراصوت از پروب به سطح قطعه، از چه ماده‌ای استفاده می‌شود؟", options: ["روغن موتور خالص", "ژل یا مایع Couplant", "آب نمک", "هیچ ماده‌ای لازم نیست"], correct: 1, explain: "Couplant (معمولاً ژل مخصوص) هوای بین پروب و سطح قطعه را حذف می‌کند تا امواج فراصوت بدون افت شدید به داخل متریال منتقل شوند." },
  { q: "چرا تفسیر نتایج UT نیاز به اپراتور باتجربه و گواهی‌دار دارد؟", options: ["چون دستگاه بسیار ارزان است", "چون تفسیر سیگنال‌ها ذهنی و وابسته به مهارت اپراتور است", "چون نیازی به آموزش ندارد", "چون نتیجه همیشه خودکار چاپ می‌شود"], correct: 1, explain: "بر خلاف RT که یک فیلم فیزیکی ثبت می‌کند، در UT اپراتور باید سیگنال‌های روی صفحه را تفسیر کند — این کار وابستگی بالایی به مهارت و تجربه دارد." },
  { q: "کالیبراسیون دستگاه UT با چه ابزاری معمولاً انجام می‌شود؟", options: ["بلوک‌های مرجع استاندارد (مثل IIW Block)", "ترازو", "دماسنج", "کرنومتر"], correct: 0, explain: "بلوک‌های کالیبراسیون استاندارد (مثل IIW Block) برای تنظیم دقیق حساسیت و مسافت دستگاه UT قبل از هر بازرسی استفاده می‌شوند." }
];
let current = 0, answers = {};
function renderDots(){const e=document.getElementById('dots');e.innerHTML='';questions.forEach((q,i)=>{const d=document.createElement('div');d.className='dot';if(i===current)d.classList.add('current');else if(answers[i]!==undefined)d.classList.add(answers[i]===questions[i].correct?'correct':'wrong');e.appendChild(d);});}
function renderQuestion(){document.getElementById('counter').textContent=`سوال ${current+1} از ${questions.length}`;const q=questions[current];const card=document.getElementById('quizCard');const answered=answers[current]!==undefined;let html=`<div class="qtext">${q.q}</div>`;q.options.forEach((opt,i)=>{let cls='opt';if(answered){if(i===q.correct)cls+=' correct';else if(i===answers[current])cls+=' wrong';}html+=`<button class="${cls}" onclick="selectAnswer(${i})" ${answered?'disabled':''}>${opt}</button>`;});if(answered)html+=`<div class="explain show"><strong>توضیح:</strong> ${q.explain}</div>`;card.innerHTML=html;document.getElementById('navRow').style.display='flex';document.getElementById('prevBtn').style.visibility=current===0?'hidden':'visible';document.getElementById('nextBtn').disabled=!answered;document.getElementById('nextBtn').textContent=current===questions.length-1?'پایان آزمون':'بعدی';renderDots();}
function selectAnswer(i){if(answers[current]!==undefined)return;answers[current]=i;renderQuestion();}
document.getElementById('prevBtn').addEventListener('click',()=>{if(current>0){current--;renderQuestion();}});
document.getElementById('nextBtn').addEventListener('click',()=>{if(current===questions.length-1)showResult();else{current++;renderQuestion();}});
function showResult(){const score=Object.entries(answers).filter(([i,a])=>a===questions[i].correct).length;const pct=Math.round((score/questions.length)*100);const passed=pct>=70;document.getElementById('navRow').style.display='none';document.getElementById('dots').style.display='none';document.getElementById('quizCard').innerHTML=`<div class="result"><div class="result-icon">${passed?'🏆':'📋'}</div><div style="font-weight:bold;font-size:16px;">${passed?'تبریک! آزمون UT را قبول شدی':'نمره کافی نبود'}</div><div class="score" style="color:${passed?'#16a34a':'#dc2626'}">${pct}٪</div><div style="font-size:12px;color:#64748b;">${score} پاسخ صحیح از ${questions.length} سوال</div><button class="restart" onclick="location.reload()">تلاش دوباره</button></div>`;}
renderQuestion();
</script>
</body>
</html>
